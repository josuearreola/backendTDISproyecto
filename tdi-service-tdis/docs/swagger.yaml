basePath: /
definitions:
  db.CatalogItem:
    properties:
      categoria_id:
        type: string
      creador_id:
        type: string
      descripcion:
        type: string
      dimension_id:
        type: string
      entorno_id:
        type: string
      evidencia_requerida:
        type: string
      fecha_creacion:
        type: string
      fecha_vencimiento:
        type: string
      horas:
        type: integer
      id:
        type: string
      nombre:
        type: string
      puntaje:
        type: integer
      trascendencia_id:
        type: string
    type: object
  db.PendingRevision:
    properties:
      apellido_materno:
        type: string
      apellido_paterno:
        type: string
      evidencia_nombre:
        type: string
      evidencia_url:
        type: string
      fecha_solicitud:
        type: string
      matricula:
        type: string
      nombre:
        type: string
      ocr_observaciones:
        type: string
      registro_tdi_id:
        type: string
      revision_id:
        type: string
      tdi_horas:
        type: integer
      tdi_nombre:
        type: string
      tdi_puntaje:
        type: integer
    type: object
  handlers.DictamenReq:
    properties:
      comentario:
        type: string
      decision:
        type: string
    required:
    - decision
    type: object
  handlers.saveTDIReq:
    properties:
      categoria_id:
        type: string
      descripcion:
        type: string
      dimension_id:
        type: string
      entorno_id:
        type: string
      evidencia_requerida:
        type: string
      fecha_vencimiento:
        description: Formato AAAA-MM-DD
        type: string
      horas:
        type: integer
      nombre:
        type: string
      puntaje:
        type: integer
      trascendencia_id:
        type: string
    type: object
  handlers.selectTDIReq:
    properties:
      catalogo_tdi_id:
        type: string
    type: object
info:
  contact: {}
  description: Servicio de Gestión de Actividades e Integración de TDIs.
  title: TDI Service API
  version: "1.0"
paths:
  /api/tdi/alumnos/progreso:
    get:
      description: Retorna la meta de puntos, puntos totales y el desglose de puntos
        por cada dimensión del alumno logueado.
      parameters:
      - description: ID del usuario (Alumno)
        in: header
        name: X-User-Id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Progreso de puntos
          schema:
            additionalProperties: true
            type: object
        "401":
          description: No autorizado
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Obtener progreso de puntos del alumno
      tags:
      - alumnos-info
  /api/tdi/catalogo:
    get:
      consumes:
      - application/json
      description: Obtiene todas las actividades vigentes con filtros opcionales
      parameters:
      - description: Filtrar por ID de Categoría
        in: query
        name: categoria_id
        type: string
      - description: Filtrar por ID de Dimensión
        in: query
        name: dimension_id
        type: string
      - description: Filtrar por ID de Entorno
        in: query
        name: entorno_id
        type: string
      - description: Filtrar por ID de Trascendencia
        in: query
        name: trascendencia_id
        type: string
      - description: Buscador por nombre o descripción
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/db.CatalogItem'
            type: array
        "500":
          description: Error interno
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar y filtrar catálogo de TDIs
      tags:
      - tdi-catalog
    post:
      consumes:
      - application/json
      description: Inserta una actividad al catálogo general verificando el rol del
        usuario en la base de datos
      parameters:
      - description: ID del usuario que ejecuta la acción
        in: header
        name: X-User-Id
        required: true
        type: string
      - description: Datos de la actividad
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.saveTDIReq'
      produces:
      - application/json
      responses:
        "201":
          description: Actividad creada
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: No autorizado
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Registrar nueva TDI en catálogo
      tags:
      - tdi-catalog
  /api/tdi/catalogo/{id}:
    delete:
      description: Elimina físicamente o expira lógicamente una actividad si ya tiene
        alumnos registrados
      parameters:
      - description: Rol de usuario
        in: header
        name: X-User-Role
        required: true
        type: string
      - description: ID de la TDI a borrar
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Actividad eliminada
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Eliminar una TDI del catálogo
      tags:
      - tdi-catalog
    get:
      description: Obtiene los detalles de una actividad específica del catálogo
      parameters:
      - description: ID de la TDI
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db.CatalogItem'
        "404":
          description: No encontrada
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener detalle de una TDI del catálogo
      tags:
      - tdi-catalog
    put:
      consumes:
      - application/json
      description: Actualiza los campos de una actividad específica del catálogo verificando
        el rol del usuario en la BD
      parameters:
      - description: ID del usuario que ejecuta la acción
        in: header
        name: X-User-Id
        required: true
        type: string
      - description: ID de la TDI a editar
        in: path
        name: id
        required: true
        type: string
      - description: Datos actualizados
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.saveTDIReq'
      produces:
      - application/json
      responses:
        "200":
          description: Actividad actualizada
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Editar una TDI del catálogo
      tags:
      - tdi-catalog
  /api/tdi/registro/{id}/subir-evidencia:
    post:
      consumes:
      - multipart/form-data
      description: Recibe un archivo (PDF, JPG, PNG, Word, Excel), lo renombra usando
        la matrícula del alumno, calcula su hash y lo guarda localmente.
      parameters:
      - description: ID del alumno que ejecuta la acción
        in: header
        name: X-User-Id
        required: true
        type: string
      - description: ID del registro de participación (registro_tdi_id)
        in: path
        name: id
        required: true
        type: string
      - description: Archivo de evidencia (Max 5MB)
        in: formData
        name: archivo
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Evidencia subida y estado actualizado
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Cuerpo o archivo inválido
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno al guardar
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Subir archivo de evidencia (Autohospedado)
      tags:
      - tdi-catalog
  /api/tdi/registro/mis-registros:
    get:
      description: Retorna el historial de inscripciones a actividades del alumno
        logueado, con su respectivo estado.
      parameters:
      - description: ID del usuario (Alumno)
        in: header
        name: X-User-Id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Lista de inscripciones
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: No autorizado
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Listar registros/inscripciones del alumno
      tags:
      - alumnos-info
  /api/tdi/registro/seleccionar:
    post:
      consumes:
      - application/json
      description: Asocia una actividad del catálogo a la cuenta de un alumno
      parameters:
      - description: ID del alumno que ejecuta la acción
        in: header
        name: X-User-Id
        required: true
        type: string
      - description: ID de la actividad a seleccionar
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.selectTDIReq'
      produces:
      - application/json
      responses:
        "200":
          description: Actividad seleccionada
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Seleccionar una actividad
      tags:
      - tdi-catalog
  /api/tdi/revisiones/{id}/dictamen:
    post:
      consumes:
      - application/json
      description: Aprueba o rechaza una revisión de evidencia asignando puntos/horas
        de forma automática en caso de aprobación.
      parameters:
      - description: ID del administrativo
        in: header
        name: X-User-Id
        required: true
        type: string
      - description: Rol del usuario que ejecuta
        in: header
        name: X-User-Role
        required: true
        type: string
      - description: ID de la revisión
        in: path
        name: id
        required: true
        type: string
      - description: Cuerpo del dictamen
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.DictamenReq'
      produces:
      - application/json
      responses:
        "200":
          description: Dictamen guardado con éxito
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Datos de entrada inválidos
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Acceso denegado
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Dictaminar una revisión manual
      tags:
      - revisiones
  /api/tdi/revisiones/pendientes:
    get:
      description: Retorna el listado de revisiones manuales en estado PENDIENTE (Solo
        Administrativos, Coordinadores o Creadores)
      parameters:
      - description: Rol del usuario que ejecuta
        in: header
        name: X-User-Role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Lista de revisiones
          schema:
            items:
              $ref: '#/definitions/db.PendingRevision'
            type: array
        "403":
          description: Acceso denegado
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Listar evidencias pendientes
      tags:
      - revisiones
securityDefinitions:
  Bearer:
    description: Escribe 'Bearer ' seguido de tu token JWT para autenticarte.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
